# This starter workflow is for a CMake project running on multiple platforms.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_OUTPUT_DIR: build

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      # Set up a matrix to run the following configurations:
      # 1. <Windows, Release, MSVC compiler toolchain>
      # 2. <Linux, Release/Debug, GCC compiler toolchain>
      # 3. <Linux, Release/Debug, Clang compiler toolchain>
      # 4. <macOS, Release/Debug, Apple Clang compiler toolchain>
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release, Debug, RelWithDebInfo]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: gcc
          - os: macos-latest
            c_compiler: cl

    steps:
    - uses: actions/checkout@v4

    - name: Cache CMake build tree and dependencies
      uses: actions/cache@v3
      with:
        path: |
          ${{ github.workspace }}/${{ env.BUILD_OUTPUT_DIR }}
          /usr/local/lib
        key: ${{ runner.os }}-${{ matrix.c_compiler }}-${{ matrix.build_type }}-cmake-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.c_compiler }}-${{ matrix.build_type }}-cmake-
          ${{ runner.os }}-${{ matrix.c_compiler }}-cmake-

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/${{ env.BUILD_OUTPUT_DIR }}" >> "$GITHUB_OUTPUT"

    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. CMAKE_BUILD_TYPE is required for single-configuration generators.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}

    - name: Build
      # Build your program with the given configuration.
      # Note: --config is needed for multi-config generators (Visual Studio on Windows).
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      # Execute tests defined by the CMake configuration.
      # ctest will output results in the build directory.
      run: ctest --build-config ${{ matrix.build_type }} --output-on-failure --verbose

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.c_compiler }}-${{ matrix.build_type }}
        path: |
          ${{ steps.strings.outputs.build-output-dir }}/Testing/
          ${{ steps.strings.outputs.build-output-dir }}/CMakeFiles/CMakeOutput.log
          ${{ steps.strings.outputs.build-output-dir }}/CMakeFiles/CMakeError.log
        retention-days: 30

  build-status:
    name: Build Status
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build.result }}" = "failure" ]; then
            echo "::error::Build failed on one or more matrix combinations"
            exit 1
          fi
          echo "✓ All builds completed successfully"
